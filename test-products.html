<!DOCTYPE html>
<html>
<head>
    <title>Products Test</title>
</head>
<body>
    <h1>Testing Products API</h1>
    <div id="products"></div>
    
    <script>
        async function testProductsAPI() {
            try {
                console.log('Testing API...');
                const response = await fetch('https://mini-ecommerce-software.onrender.com/api/products?limit=5');
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('API Data:', data);
                
                const productsDiv = document.getElementById('products');
                productsDiv.innerHTML = `
                    <h2>Products Found: ${data.products ? data.products.length : 0}</h2>
                    ${data.products ? data.products.map(p => `
                        <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                            <h3>${p.name}</h3>
                            <p>Price: $${(p.priceCents / 100).toFixed(2)}</p>
                            <p>Category: ${p.category}</p>
                            <img src="${p.mainImageUrl}" width="100" />
                        </div>
                    `).join('') : 'No products found'}
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('products').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
        
        testProductsAPI();
    </script>
</body>
</html>
