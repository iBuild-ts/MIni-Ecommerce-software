<!DOCTYPE html>
<html>
<head>
    <title>Test Admin Products API</title>
</head>
<body>
    <h1>Testing Admin Products API</h1>
    <button onclick="testAPI()">Test API Call</button>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch('https://mini-ecommerce-software.onrender.com/api/products');
                console.log('Response status:', response.status);
                console.log('CORS headers:', response.headers.get('Access-Control-Allow-Origin'));
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Products data:', data);
                    results.innerHTML = `
                        <h3>✅ SUCCESS!</h3>
                        <p>Status: ${response.status}</p>
                        <p>Products count: ${data.products ? data.products.length : 'No products array'}</p>
                        <p>CORS Origin: ${response.headers.get('Access-Control-Allow-Origin') || 'MISSING!'}</p>
                        <pre>${JSON.stringify(data.products?.slice(0, 2) || [], null, 2)}</pre>
                    `;
                } else {
                    results.innerHTML = `<h3>❌ FAILED</h3><p>Status: ${response.status}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `<h3>❌ ERROR</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
